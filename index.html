<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умные Задачи</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- ЭКРАН 1: Приветствие и знакомство -->
        <div id="welcome-screen">
            <div class="teacher-icon">🦉</div>
            <h1>Привет!</h1>
            <p class="teacher-speech">Я профессор Фил. А как зовут тебя?</p>
            
            <input type="text" id="username" placeholder="Моё имя..." autocomplete="off">
            <br>
            <button class="action-btn" onclick="saveNameAndStart()">Познакомиться</button>
        </div>

        <!-- ЭКРАН 2: Уроки (Скрыт по умолчанию) -->
        <div id="main-screen" class="hidden">
            <header class="top-bar">
                <button class="back-btn" onclick="goBack()" title="Сменить имя">🔙 Назад</button>
                <div class="score-board">Очки: <span id="score">0</span></div>
            </header>

            <h1 id="greeting">Тренировка Ума 🧠</h1>
            
            <main id="lesson-container">
                <div id="question-box" class="card">
                    <h2 id="question-text">Нажми "Начать", чтобы запустить урок!</h2>
                    <div id="image-container"></div>
                    <div id="options-container" class="options"></div>
                    <button id="start-btn" class="action-btn" onclick="startLesson()">Начать</button>
                </div>
                <div id="chat-section" class="card">
                    <h3>💬 Спроси профессора Фила</h3>
                    <div id="chat-log"></div>
                    <div class="chat-controls">
                        <button id="mic-btn" class="mic-btn" title="Нажми и говори">🎤</button>
                        <input type="text" id="chat-input" placeholder="Напиши или продиктуй..." autocomplete="off">
                        <button id="send-btn" class="action-btn" onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
                <div id="feedback" class="feedback hidden"></div>
            </main>
        </div>

    </div>

    <script src="/script.js"></script>
</body>
</html>
