<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умные Задачи</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Тренировка Ума 🧠</h1>
            <div class="score-board">Очки: <span id="score">0</span></div>
        </header>

        <main id="lesson-container">
            <!-- Сюда JavaScript будет подставлять вопросы -->
            <div id="question-box" class="card">
                <h2 id="question-text">Нажми "Начать", чтобы запустить первый урок!</h2>
                <div id="image-container"></div>
                <div id="options-container" class="options"></div>
                <button id="start-btn" class="action-btn" onclick="startLesson()">Начать</button>
            </div>
            <div id="feedback" class="feedback hidden"></div>
        </main>
    </div>

    <!-- Подключаем логику -->
    <script src="/script.js"></script>
</body>
</html>
